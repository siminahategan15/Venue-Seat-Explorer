<p-menubar [model]="items">
  <ng-template pTemplate="end">
    <div
      *ngIf="auth.authState$ | async as user"
      class="flex align-items-center gap-3"
    >
      <span class="font-bold">Hello, {{ user.displayName }}</span>

      <button
        pButton
        type="button"
        label="Logout"
        icon="pi pi-sign-out"
        class="p-button-text"
        (click)="logout()"
      ></button>
    </div>
  </ng-template>
</p-menubar>
