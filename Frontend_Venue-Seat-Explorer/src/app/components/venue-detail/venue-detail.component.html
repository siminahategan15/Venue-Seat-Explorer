<p-progressSpinner *ngIf="loading"></p-progressSpinner>

<div *ngIf="venue" class="p-4">
  <h1 class="text-3xl font-bold mb-2">{{ venue.name }}</h1>
  <p>{{ venue.city }}, {{ venue.country }}</p>
  <p *ngIf="venue.description" class="mt-2">{{ venue.description }}</p>
  <p class="mt-2">Capacity: {{ venue.capacity }}</p>

  <h2 class="text-2xl font-bold mt-5 mb-3">Seats</h2>

  <p *ngIf="seats.length === 0">No seats available.</p>

  <p-table *ngIf="seats.length > 0" [value]="seats" [paginator]="true" [rows]="10">
    <ng-template pTemplate="header">
      <tr>
        <th>Row</th>
        <th>Seat Number</th>
        <th>Actions</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-seat>
      <tr>
        <td>{{ seat.row }}</td>
        <td>{{ seat.seatNumber }}</td>
        <td>
          <a [routerLink]="['/seats', seat._id]">View Details</a>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
